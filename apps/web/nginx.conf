server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # --- Headers de segurança ---
    # CSP calibrado pro que o SPA realmente usa:
    #  - script-src 'self'        → build do Vite só tem módulo externo (sem inline)
    #  - style-src unsafe-inline   → estilos inline do React (style={{}}) + Google Fonts CSS
    #  - img-src flagcdn           → bandeiras dos times
    #  - font-src gstatic          → arquivos de fonte do Google Fonts
    #  - connect-src 'self' https: → API (subdomínio) + Sentry, sem hardcode de domínio
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https://flagcdn.com; connect-src 'self' https:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "DENY" always;

    # gzip nos assets de texto
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # assets com hash no nome → cache longo e imutável
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback: qualquer rota desconhecida cai no index.html
    # (necessário por causa do BrowserRouter do react-router)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
